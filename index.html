<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hustle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hanken Grotesk',sans-serif;-webkit-font-smoothing:antialiased;background:#FBF4E9;color:#161412}
input::placeholder{color:#b3ab9c}
input:focus,select:focus{outline:none}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#dcd3c2;border-radius:99px;border:3px solid #FBF4E9}
.btn-x{border:2px solid #ECE4D4;background:#fff;color:#b3ab9c;cursor:pointer;line-height:1;font-weight:800}
.btn-x:hover{border-color:#FF5C2B;color:#FF5C2B}
.step-x{border:none;background:none;color:#c4bcab;cursor:pointer;line-height:1;font-weight:800}
.step-x:hover{color:#FF5C2B}
</style>
</head>
<body>
<div id="app"></div>
<script>
class HustleApp {
  constructor() {
    this.props = { accentColor: '#1F3FE0', goalAmount: 5000, userName: 'Maya' };
    this.state = {
      tab: 'today',
      skills: [
        { name: 'Web design', level: 3, earned: 450 },
        { name: 'Public speaking', level: 3, earned: 0 },
        { name: 'Copywriting', level: 2, earned: 300 },
        { name: 'Photography', level: 1, earned: 180 },
      ],
      ideas: [
        { id: 'i1', name: 'Notion template shop', reward: 5, effort: 3, steps: [
          { text: 'Design 3 starter templates', done: true },
          { text: 'Set up Gumroad store', done: false },
          { text: 'Write launch tweet thread', done: false },
        ]},
        { id: 'i2', name: 'Copywriting retainer', reward: 5, effort: 4, steps: [
          { text: 'List 10 dream clients', done: false },
        ]},
        { id: 'i3', name: 'Brand photo packages', reward: 3, effort: 3, steps: [] },
      ],
      earnings: [
        { id: 'e1', label: 'Logo refresh', skill: 'Web design', amount: 450, date: 'Jun 12' },
        { id: 'e2', label: 'Product copy', skill: 'Copywriting', amount: 300, date: 'Jun 9' },
        { id: 'e3', label: 'Headshots', skill: 'Photography', amount: 180, date: 'Jun 4' },
      ],
      platforms: [
        { id: 'p1', name: 'Gumroad', url: 'https://gumroad.com', note: 'Sell digital products & templates' },
        { id: 'p2', name: 'Upwork', url: 'https://upwork.com', note: 'Freelance client work' },
        { id: 'p3', name: 'Fiverr', url: 'https://fiverr.com', note: 'Productized gigs' },
        { id: 'p4', name: 'Substack', url: 'https://substack.com', note: 'Paid newsletter' },
      ],
      expanded: 'i1',
      calPeriod: 'weekly',
      calGoals: {
        daily:     [],
        weekly:    [],
        quarterly: [],
        yearly:    [],
      },
      draft: {
        skillName: '', ideaName: '', reward: 4, effort: 2,
        earnLabel: '', earnSkill: 'Web design', earnAmount: '',
        stepText: {}, platName: '', platUrl: '', platNote: '',
        calText: '', calAmount: '',
      },
      seq: 100,
    };
    this.render();
  }

  setState(update) {
    const prev = this.state;
    this.state = { ...prev, ...(typeof update === 'function' ? update(prev) : update) };
    this.render();
  }

  setDraft(k, v) { this.setState(s => ({ draft: { ...s.draft, [k]: v } })); }

  // helpers
  fmt(n) { return '$' + Math.round(n).toLocaleString('en-US'); }
  levelMeta(lvl) {
    if (lvl >= 3) return { label: 'Pro', bg: '#161412', color: '#fff' };
    if (lvl === 2) return { label: 'Mid', bg: '#FFE14D', color: '#161412' };
    return { label: 'New', bg: '#F1ECE0', color: '#7a7468' };
  }
  scoreOf(r, e) { return Math.round(((r / 5) * 0.6 + ((6 - e) / 5) * 0.4) * 100) / 10; }
  tier(score) {
    if (score >= 8) return { bg: '#E6F7EC', color: '#1F8A4C' };
    if (score >= 6.5) return { bg: '#FFF3D6', color: this.props.accentColor };
    return { bg: '#FCE9E1', color: '#FF5C2B' };
  }
  word(n) { return n <= 2 ? 'low' : n === 3 ? 'medium' : 'high'; }
  emojiFor(sk) {
    return { 'Web design': '🎨', 'Copywriting': '✍️', 'Photography': '📷', 'Public speaking': '🎤' }[sk] || '💰';
  }
  esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  jstr(s) { return "'" + String(s ?? '').replace(/\\/g, '\\\\').replace(/'/g, "\\'") + "'"; }

  // actions
  setTab(tab) { this.setState({ tab }); }

  addSkill() {
    const name = this.state.draft.skillName.trim();
    if (!name) return;
    this.setState(s => ({ skills: [...s.skills, { name, level: 1, earned: 0 }], draft: { ...s.draft, skillName: '' } }));
  }
  setLevel(idx, lvl) {
    this.setState(s => ({ skills: s.skills.map((sk, i) => i === idx ? { ...sk, level: lvl } : sk) }));
  }
  removeSkill(idx) {
    this.setState(s => ({ skills: s.skills.filter((_, i) => i !== idx) }));
  }

  bump(k, d) {
    this.setState(s => ({ draft: { ...s.draft, [k]: Math.max(1, Math.min(5, s.draft[k] + d)) } }));
  }
  addIdea() {
    const d = this.state.draft;
    const name = d.ideaName.trim();
    if (!name) return;
    const id = 'i' + (this.state.seq + 1);
    this.setState(s => ({
      seq: s.seq + 1,
      ideas: [...s.ideas, { id, name, reward: d.reward, effort: d.effort, steps: [] }],
      draft: { ...s.draft, ideaName: '', reward: 4, effort: 2 },
      expanded: id,
    }));
  }
  toggleExpand(id) { this.setState(s => ({ expanded: s.expanded === id ? null : id })); }
  removeIdea(id) {
    this.setState(s => ({
      ideas: s.ideas.filter(i => i.id !== id),
      expanded: s.expanded === id ? null : s.expanded,
    }));
  }
  removeStep(ideaId, stepIdx) {
    this.setState(s => ({
      ideas: s.ideas.map(idea => idea.id === ideaId
        ? { ...idea, steps: idea.steps.filter((_, j) => j !== stepIdx) }
        : idea)
    }));
  }
  toggleStep(ideaId, stepIdx) {
    this.setState(s => ({
      ideas: s.ideas.map(idea => idea.id === ideaId
        ? { ...idea, steps: idea.steps.map((st, j) => j === stepIdx ? { ...st, done: !st.done } : st) }
        : idea)
    }));
  }
  setStepDraft(id, v) {
    this.setState(s => ({ draft: { ...s.draft, stepText: { ...s.draft.stepText, [id]: v } } }));
  }
  addStep(id) {
    const t = (this.state.draft.stepText[id] || '').trim();
    if (!t) return;
    this.setState(s => ({
      ideas: s.ideas.map(idea => idea.id === id ? { ...idea, steps: [...idea.steps, { text: t, done: false }] } : idea),
      draft: { ...s.draft, stepText: { ...s.draft.stepText, [id]: '' } },
    }));
  }

  addEarning() {
    const d = this.state.draft;
    const label = d.earnLabel.trim();
    const amt = parseFloat(d.earnAmount);
    if (!label || !amt || amt <= 0) return;
    const date = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    this.setState(s => ({
      seq: s.seq + 1,
      earnings: [{ id: 'e' + (s.seq + 1), label, skill: d.earnSkill, amount: amt, date }, ...s.earnings],
      skills: s.skills.map(sk => sk.name === d.earnSkill ? { ...sk, earned: sk.earned + amt } : sk),
      draft: { ...s.draft, earnLabel: '', earnAmount: '' },
    }));
  }
  removeEarning(id) {
    this.setState(s => {
      const gone = s.earnings.find(e => e.id === id);
      return {
        earnings: s.earnings.filter(e => e.id !== id),
        skills: gone ? s.skills.map(sk => sk.name === gone.skill ? { ...sk, earned: Math.max(0, sk.earned - gone.amount) } : sk) : s.skills,
      };
    });
  }
  logOpp(title, skill, pay) {
    const date = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    this.setState(s => ({
      seq: s.seq + 1,
      earnings: [{ id: 'e' + (s.seq + 1), label: title, skill, amount: pay, date }, ...s.earnings],
      skills: s.skills.map(sk => sk.name === skill ? { ...sk, earned: sk.earned + pay } : sk),
      tab: 'money',
    }));
  }

  setCalPeriod(p) { this.setState({ calPeriod: p }); }
  addCalGoal() {
    const d = this.state.draft;
    const text = d.calText.trim();
    if (!text) return;
    const p = this.state.calPeriod;
    const id = 'cg' + (this.state.seq + 1);
    const isProgress = p === 'quarterly' || p === 'yearly';
    const goal = isProgress
      ? { id, text, target: parseFloat(d.calAmount) || 0, current: 0 }
      : { id, text, done: false };
    this.setState(s => ({
      seq: s.seq + 1,
      calGoals: { ...s.calGoals, [p]: [...s.calGoals[p], goal] },
      draft: { ...s.draft, calText: '', calAmount: '' },
    }));
  }
  removeCalGoal(id) {
    const p = this.state.calPeriod;
    this.setState(s => ({
      calGoals: { ...s.calGoals, [p]: s.calGoals[p].filter(g => g.id !== id) },
    }));
  }
  toggleCalGoal(id) {
    const p = this.state.calPeriod;
    this.setState(s => ({
      calGoals: { ...s.calGoals, [p]: s.calGoals[p].map(g => g.id === id ? { ...g, done: !g.done } : g) },
    }));
  }
  setCalProgress(id, val) {
    const p = this.state.calPeriod;
    const num = parseFloat(val) || 0;
    this.setState(s => ({
      calGoals: { ...s.calGoals, [p]: s.calGoals[p].map(g => g.id === id ? { ...g, current: Math.max(0, num) } : g) },
    }));
  }

  addPlatform() {
    const d = this.state.draft;
    const name = d.platName.trim();
    let url = d.platUrl.trim();
    if (!name || !url) return;
    if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
    this.setState(s => ({
      seq: s.seq + 1,
      platforms: [...s.platforms, { id: 'p' + (s.seq + 1), name, url, note: d.platNote.trim() }],
      draft: { ...s.draft, platName: '', platUrl: '', platNote: '' },
    }));
  }
  removePlatform(id) { this.setState(s => ({ platforms: s.platforms.filter(p => p.id !== id) })); }

  // render
  render() {
    const root = document.getElementById('app');
    const active = document.activeElement;
    const uid = active && active.dataset ? active.dataset.uid : null;
    const selStart = active ? active.selectionStart : null;
    const selEnd = active ? active.selectionEnd : null;

    root.innerHTML = this.buildHTML();

    if (uid) {
      const el = root.querySelector('[data-uid="' + uid + '"]');
      if (el) {
        el.focus();
        try { el.setSelectionRange(selStart, selEnd); } catch(e) {}
      }
    }
  }

  buildHTML() {
    const s = this.state;
    const accent = this.props.accentColor;
    const goal = this.props.goalAmount;
    const userName = this.props.userName;
    const total = s.earnings.reduce((a, e) => a + e.amount, 0);
    const pct = Math.max(0, Math.min(100, Math.round((total / goal) * 100)));
    const remaining = Math.max(0, goal - total);

    const tabs = [['today','Today'],['skills','Skills'],['ideas','Ideas'],['platforms','Platforms'],['calendar','Calendar'],['money','Money']];
    const tabsHTML = tabs.map(([key, label]) => {
      const active = s.tab === key;
      return `<button onclick="app.setTab(${this.jstr(key)})" style="font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;border:none;border-radius:99px;padding:7px 16px;background:${active ? '#161412' : 'transparent'};color:${active ? '#fff' : '#7a7468'}">${label}</button>`;
    }).join('');

    // Prepare shared computed data
    const decIdeas = s.ideas.map(idea => {
      const score = this.scoreOf(idea.reward, idea.effort);
      const t = this.tier(score);
      const done = idea.steps.filter(st => st.done).length;
      return { ...idea, score, ...t, scoreStr: score.toFixed(1),
        profile: this.word(idea.reward) + ' reward · ' + this.word(idea.effort) + ' effort',
        expanded: s.expanded === idea.id,
        stepSummary: idea.steps.length ? `${done}/${idea.steps.length} steps` : 'no steps',
      };
    }).sort((a, b) => b.score - a.score);

    const skillNames = s.skills.map(sk => sk.name);
    const oppPool = [
      { title: 'Landing page design', skill: 'Web design', pay: 1200 },
      { title: 'Email welcome sequence', skill: 'Copywriting', pay: 800 },
      { title: 'Conference talk', skill: 'Public speaking', pay: 1500 },
      { title: 'Event photography', skill: 'Photography', pay: 600 },
    ];
    const opps = oppPool.filter(o => skillNames.includes(o.skill));
    const earningsList = s.earnings.map((e, i, arr) => ({
      ...e, amountLabel: '+' + this.fmt(e.amount),
      emoji: this.emojiFor(e.skill),
      border: i === arr.length - 1 ? 'transparent' : '#f0e9da',
    }));

    const topIdeas = decIdeas.slice(0, 3);
    const topOpp = opps[0];
    const topName = topIdeas[0] ? topIdeas[0].name : 'your best idea';
    const nextMove = topOpp
      ? `Pitch the ${this.fmt(topOpp.pay)} ${topOpp.title.toLowerCase()} — it matches ${topOpp.skill}`
      : `Push "${topName}" forward — it's your highest-scoring idea`;

    let tabContent = '';
    if (s.tab === 'today') tabContent = this.todayHTML(accent, userName, total, goal, remaining, pct, topIdeas, earningsList, nextMove);
    else if (s.tab === 'skills') tabContent = this.skillsHTML(opps);
    else if (s.tab === 'ideas') tabContent = this.ideasHTML(decIdeas, accent);
    else if (s.tab === 'platforms') tabContent = this.platformsHTML();
    else if (s.tab === 'calendar') tabContent = this.calendarHTML(accent);
    else if (s.tab === 'money') tabContent = this.moneyHTML(accent, total, goal, remaining, earningsList);

    return `<div style="min-height:100vh;background:#FBF4E9">
  <div style="position:sticky;top:0;z-index:20;background:#FBF4E9;border-bottom:2px solid #161412">
    <div style="max-width:1080px;margin:0 auto;padding:16px 28px;display:flex;align-items:center;justify-content:space-between">
      <div style="display:flex;align-items:center;gap:28px">
        <span style="font-family:'Bricolage Grotesque',sans-serif;font-size:20px;font-weight:800;letter-spacing:-.02em">HUSTLE</span>
        <div style="display:flex;gap:6px">${tabsHTML}</div>
      </div>
      <div style="display:flex;align-items:center;gap:14px">
        <div style="text-align:right;line-height:1.1">
          <div style="font-size:11px;font-weight:700;color:#7a7468;text-transform:uppercase;letter-spacing:.06em">Banked in June</div>
          <div style="font-family:'Bricolage Grotesque',sans-serif;font-size:15px;font-weight:800;color:#1F8A4C">${this.fmt(total)}</div>
        </div>
        <div style="width:34px;height:34px;border-radius:50%;background:#FF5C2B;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff">${this.esc(userName.charAt(0).toUpperCase())}</div>
      </div>
    </div>
  </div>
  <div style="max-width:1080px;margin:0 auto;padding:28px">${tabContent}</div>
</div>`;
  }

  todayHTML(accent, userName, total, goal, remaining, pct, topIdeas, earningsList, nextMove) {
    const s = this.state;
    const skillChips = s.skills.map(sk => {
      const m = this.levelMeta(sk.level);
      return `<span style="font-size:13px;font-weight:700;padding:6px 12px;border-radius:99px;background:${m.bg};color:${m.color}">${this.esc(sk.name)} · ${m.label}</span>`;
    }).join('');

    const topIdeasHTML = topIdeas.map(idea => `
      <div style="display:flex;align-items:center;justify-content:space-between;border-radius:12px;padding:13px 16px;background:${idea.bg}">
        <div>
          <div style="font-size:14px;font-weight:700">${this.esc(idea.name)}</div>
          <div style="font-size:11px;color:#7a7468;font-weight:600">${idea.profile}</div>
        </div>
        <div style="font-family:'Bricolage Grotesque',sans-serif;font-size:22px;font-weight:800;color:${idea.color}">${idea.scoreStr}</div>
      </div>`).join('');

    const recentHTML = earningsList.slice(0, 3).map(e => `
      <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:600">
        <span>${this.esc(e.label)}</span>
        <span style="color:#1F8A4C;font-weight:800">${e.amountLabel}</span>
      </div>`).join('');

    return `<div>
  <div style="border-radius:18px;padding:28px;color:#fff;margin-bottom:22px;background:${accent}">
    <div style="font-size:13px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;opacity:.82;margin-bottom:10px">Keep going, ${this.esc(userName)} 🔥</div>
    <div style="display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px">
      <div>
        <div style="font-family:'Bricolage Grotesque',sans-serif;font-size:52px;font-weight:800;line-height:1;letter-spacing:-.03em">${this.fmt(total)}</div>
        <div style="font-size:15px;opacity:.85;margin-top:8px">of your ${this.fmt(goal)} June goal — ${this.fmt(remaining)} to go</div>
      </div>
      <div style="font-family:'Bricolage Grotesque',sans-serif;font-size:58px;font-weight:800;letter-spacing:-.03em">${pct}%</div>
    </div>
    <div style="height:12px;background:rgba(255,255,255,.25);border-radius:99px;overflow:hidden;margin-top:20px">
      <div style="height:100%;background:#FFE14D;border-radius:99px;transition:width .4s ease;width:${pct}%"></div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1.15fr .85fr;gap:20px;margin-bottom:20px">
    <div style="background:#fff;border:2px solid #161412;border-radius:16px;padding:22px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <div style="font-family:'Bricolage Grotesque',sans-serif;font-size:17px;font-weight:700">💡 Best ideas right now</div>
        <button onclick="app.setTab('ideas')" style="font-size:13px;font-weight:700;color:#7a7468;background:none;border:none;cursor:pointer">View all →</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:12px">${topIdeasHTML || '<div style="font-size:13px;color:#a39c8e;font-weight:600">No ideas yet — add some in the Ideas tab.</div>'}</div>
    </div>
    <div style="background:#fff;border:2px solid #161412;border-radius:16px;padding:22px">
      <div style="font-family:'Bricolage Grotesque',sans-serif;font-size:17px;font-weight:700;margin-bottom:14px">⚡ Your skills</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">${skillChips || '<span style="font-size:13px;color:#a39c8e">No skills yet.</span>'}</div>
      <div style="margin-top:20px;font-size:12px;font-weight:700;color:#7a7468;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px">Recently banked</div>
      <div style="display:flex;flex-direction:column;gap:9px">${recentHTML || '<div style="font-size:13px;color:#a39c8e;font-weight:600">Nothing banked yet.</div>'}</div>
    </div>
  </div>

  <div style="background:#161412;border-radius:16px;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;color:#fff;gap:16px;flex-wrap:wrap">
    <div>
      <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#FFE14D;margin-bottom:5px">Next move</div>
      <div style="font-size:16px;font-weight:600">${this.esc(nextMove)}</div>
    </div>
    <button onclick="app.setTab('ideas')" style="font-family:'Bricolage Grotesque',sans-serif;font-size:14px;font-weight:700;background:#FF5C2B;color:#fff;border:none;padding:11px 20px;border-radius:99px;cursor:pointer">Make a plan →</button>
  </div>
</div>`;
  }

  skillsHTML(opps) {
    const s = this.state;
    const rowsHTML = s.skills.map((sk, idx) => {
      const m = this.levelMeta(sk.level);
      const pips = [1,2,3].map(lv =>
        `<button onclick="app.setLevel(${idx},${lv})" title="Set level ${lv}" style="width:42px;height:8px;border:none;border-radius:3px;cursor:pointer;padding:0;background:${lv <= sk.level ? '#161412' : '#EDE6D7'}"></button>`
      ).join('');
      return `<div style="background:#fff;border:2px solid #161412;border-radius:14px;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:16px">
  <div style="flex:1">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <span style="font-size:15px;font-weight:700">${this.esc(sk.name)}</span>
      <span style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:3px 9px;border-radius:99px;background:${m.bg};color:${m.color}">${m.label}</span>
    </div>
    <div style="display:flex;gap:5px">${pips}</div>
  </div>
  <div style="text-align:right">
    <div style="font-family:'Bricolage Grotesque',sans-serif;font-size:13px;font-weight:700;color:#1F8A4C">${this.fmt(sk.earned)}</div>
    <div style="font-size:10px;color:#7a7468;font-weight:600">earned</div>
  </div>
  <button onclick="app.removeSkill(${idx})" title="Remove skill" class="btn-x" style="width:30px;height:30px;flex:none;border-radius:9px;font-size:16px">×</button>
</div>`;
    }).join('');

    const oppsHTML = opps.map(o =>
      `<div style="background:#262220;border-radius:12px;padding:14px">
  <div style="display:flex;justify-content:space-between;align-items:start;gap:8px">

  calendarHTML(accent) {
    const s = this.state;
    const p = s.calPeriod;
    const goals = s.calGoals[p];
    const isProgress = p === 'quarterly' || p === 'yearly';

    const now = new Date();
    const periods = [
      ['daily',     'Daily'],
      ['weekly',    'Weekly'],
      ['quarterly', 'Quarterly'],
      ['yearly',    'Yearly'],
    ];
    const periodTabs = periods.map(([key, label]) => {
      const active = p === key;
      return `<button onclick="app.setCalPeriod(${this.jstr(key)})" style="font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;border:2px solid #161412;border-radius:10px;padding:9px 20px;background:${active ? '#161412' : '#fff'};color:${active ? '#fff' : '#161412'}">${label}</button>`;
    }).join('');

    // Period label + context line
    const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const today = `${dayNames[now.getDay()]}, ${monthNames[now.getMonth()]} ${now.getDate()}`;
    const weekStart = new Date(now); weekStart.setDate(now.getDate() - now.getDay());
    const weekEnd = new Date(weekStart); weekEnd.setDate(weekStart.getDate() + 6);
    const quarter = Math.ceil((now.getMonth() + 1) / 3);
    const weekRange = `Week of ${monthNames[weekStart.getMonth()]} ${weekStart.getDate()} – ${monthNames[weekEnd.getMonth()]} ${weekEnd.getDate()}`;
    const context = { daily: today, weekly: weekRange, quarterly: `Q${quarter} · ${now.getFullYear()}`, yearly: String(now.getFullYear()) }[p];

    // Add form
    const addForm = `<div style="background:#fff;border:2px solid #161412;border-radius:16px;padding:18px;margin-bottom:18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <input data-uid="cal-text" value="${this.esc(s.draft.calText)}" oninput="app.setDraft('calText',this.value)" onkeydown="if(event.key==='Enter')app.addCalGoal()" placeholder="${isProgress ? 'Goal name…' : 'What to accomplish…'}" style="flex:1;min-width:200px;font-family:inherit;font-size:15px;font-weight:600;background:#FBF4E9;border:2px solid #161412;border-radius:10px;padding:11px 14px"/>
      ${isProgress ? `<div style="display:flex;align-items:center;background:#FBF4E9;border:2px solid #161412;border-radius:10px;padding:0 14px"><span style="font-weight:800;font-size:15px">$</span><input data-uid="cal-amount" value="${this.esc(s.draft.calAmount)}" oninput="app.setDraft('calAmount',this.value.replace(/[^0-9.]/g,''))" inputmode="numeric" placeholder="Target" style="width:100px;font-family:inherit;font-size:15px;font-weight:700;background:none;border:none;padding:11px 6px"/></div>` : ''}
      <button onclick="app.addCalGoal()" style="font-family:'Bricolage Grotesque',sans-serif;font-size:14px;font-weight:700;background:#161412;color:#fff;border:none;padding:12px 22px;border-radius:10px;cursor:pointer">Add goal</button>
    </div>`;

    // Goals list
    let goalsHTML = '';
    if (goals.length === 0) {
      goalsHTML = `<div style="background:#fff;border:2px dashed #d9cdb4;border-radius:16px;padding:34px;text-align:center;font-size:14px;color:#a39c8e;font-weight:600">No goals yet for this period — add your first above.</div>`;
    } else if (isProgress) {
      goalsHTML = goals.map(g => {
        const pct = g.target > 0 ? Math.min(100, Math.round((g.current / g.target) * 100)) : 0;
        const barColor = pct >= 100 ? '#1F8A4C' : pct >= 50 ? accent : '#FF5C2B';
        return `<div style="background:#fff;border:2px solid #161412;border-radius:16px;padding:20px 22px">
          <div style="display:flex;align-items:start;justify-content:space-between;margin-bottom:14px">
            <div>
              <div style="font-size:16px;font-weight:700">${this.esc(g.text)}</div>
              ${g.target > 0 ? `<div style="font-size:12px;color:#7a7468;font-weight:600;margin-top:2px">Target: ${this.fmt(g.target)}</div>` : ''}
            </div>
            <div style="display:flex;align-items:center;gap:10px">
              <span style="font-family:'Bricolage Grotesque',sans-serif;font-size:22px;font-weight:800;color:${barColor}">${pct}%</span>
              <button onclick="app.removeCalGoal(${this.jstr(g.id)})" class="btn-x" style="width:30px;height:30px;border-radius:9px;font-size:16px">×</button>
            </div>
          </div>
          <div style="height:10px;background:#F1ECE0;border-radius:99px;overflow:hidden;margin-bottom:12px">
            <div style="height:100%;background:${barColor};border-radius:99px;width:${pct}%;transition:width .3s ease"></div>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:13px;font-weight:600;color:#7a7468">Update progress:</span>
            <div style="display:flex;align-items:center;background:#FBF4E9;border:2px solid #d9cdb4;border-radius:9px;padding:0 10px">
              <span style="font-weight:800">$</span>
              <input data-uid="cal-prog-${this.esc(g.id)}" value="${g.current}" oninput="app.setCalProgress(${this.jstr(g.id)},this.value)" inputmode="numeric" style="width:80px;font-family:inherit;font-size:14px;font-weight:700;background:none;border:none;padding:8px 6px"/>
            </div>
          </div>
        </div>`;
      }).join('');
    } else {
      const done = goals.filter(g => g.done).length;
      const progressPct = goals.length ? Math.round((done / goals.length) * 100) : 0;
      const summary = `<div style="background:#fff;border:2px solid #161412;border-radius:14px;padding:16px 20px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-size:13px;font-weight:700;color:#7a7468;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Progress</div>
          <div style="height:8px;width:220px;background:#F1ECE0;border-radius:99px;overflow:hidden">
            <div style="height:100%;background:${progressPct===100?'#1F8A4C':accent};border-radius:99px;width:${progressPct}%;transition:width .3s ease"></div>
          </div>
        </div>
        <div style="font-family:'Bricolage Grotesque',sans-serif;font-size:30px;font-weight:800;color:${progressPct===100?'#1F8A4C':accent}">${done}/${goals.length}</div>
      </div>`;
      const items = goals.map(g => `
        <div style="background:#fff;border:2px solid ${g.done ? '#E6F7EC' : '#161412'};border-radius:14px;padding:16px 18px;display:flex;align-items:center;gap:14px">
          <div onclick="app.toggleCalGoal(${this.jstr(g.id)})" style="width:26px;height:26px;border-radius:8px;border:2px solid #161412;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;cursor:pointer;flex:none;background:${g.done ? '#1F8A4C' : '#fff'};color:${g.done ? '#fff' : 'transparent'}">${g.done ? '✓' : ''}</div>
          <span onclick="app.toggleCalGoal(${this.jstr(g.id)})" style="flex:1;font-size:15px;font-weight:${g.done ? '600' : '700'};color:${g.done ? '#a39c8e' : '#161412'};text-decoration:${g.done ? 'line-through' : 'none'};cursor:pointer">${this.esc(g.text)}</span>
          <button onclick="app.removeCalGoal(${this.jstr(g.id)})" class="btn-x" style="width:30px;height:30px;flex:none;border-radius:9px;font-size:16px">×</button>
        </div>`).join('');
      goalsHTML = summary + `<div style="display:flex;flex-direction:column;gap:10px">${items}</div>`;
    }

    return `<div>
  <div style="margin-bottom:22px">
    <h1 style="font-family:'Bricolage Grotesque',sans-serif;font-size:28px;font-weight:800;letter-spacing:-.02em">Goal Calendar</h1>
    <p style="font-size:14px;color:#7a7468;margin-top:4px">Track what you need to hit — daily, weekly, quarterly, and yearly.</p>
  </div>
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:22px">
    <div style="display:flex;gap:8px;flex-wrap:wrap">${periodTabs}</div>
    <div style="font-family:'Bricolage Grotesque',sans-serif;font-size:15px;font-weight:700;color:#7a7468">${this.esc(context)}</div>
  </div>
  ${addForm}
  ${goalsHTML}
</div>`;
  }

    const skillOptions = s.skills.map(sk =>
      `<option value="${this.esc(sk.name)}"${s.draft.earnSkill === sk.name ? ' selected' : ''}>${this.esc(sk.name)}</option>`
    ).join('');

    const log = earningsList.map(e => `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:15px 20px;border-bottom:1px solid ${e.border}">
        <div style="display:flex;align-items:center;gap:14px">
          <div style="width:38px;height:38px;border-radius:10px;background:#FFF3D6;display:flex;align-items:center;justify-content:center;font-size:16px">${e.emoji}</div>
          <div>
            <div style="font-size:15px;font-weight:700">${this.esc(e.label)}</div>
            <div style="font-size:12px;color:#7a7468;font-weight:600">${this.esc(e.skill)} · ${e.date}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:14px">
          <span style="font-family:'Bricolage Grotesque',sans-serif;font-size:17px;font-weight:800;color:#1F8A4C">${e.amountLabel}</span>
          <button onclick="app.removeEarning(${this.jstr(e.id)})" class="btn-x" style="width:28px;height:28px;flex:none;border-radius:8px;font-size:15px">×</button>
        </div>
      </div>`).join('');

    return `<div>
  <div style="margin-bottom:20px">
    <h1 style="font-family:'Bricolage Grotesque',sans-serif;font-size:28px;font-weight:800;letter-spacing:-.02em">Money</h1>
    <p style="font-size:14px;color:#7a7468;margin-top:4px">Every dollar you've banked, and how close you are to the goal.</p>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:22px">
    <div style="background:${accent};border-radius:16px;padding:20px;color:#fff">
      <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;opacity:.82">Banked</div>
      <div style="font-family:'Bricolage Grotesque',sans-serif;font-size:30px;font-weight:800;margin-top:6px">${this.fmt(total)}</div>
    </div>
    <div style="background:#fff;border:2px solid #161412;border-radius:16px;padding:20px">
      <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#7a7468">Goal</div>
      <div style="font-family:'Bricolage Grotesque',sans-serif;font-size:30px;font-weight:800;margin-top:6px">${this.fmt(goal)}</div>
    </div>
    <div style="background:#fff;border:2px solid #161412;border-radius:16px;padding:20px">
      <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#7a7468">To go</div>
      <div style="font-family:'Bricolage Grotesque',sans-serif;font-size:30px;font-weight:800;margin-top:6px;color:#FF5C2B">${this.fmt(remaining)}</div>
    </div>
  </div>
  <div style="background:#fff;border:2px solid #161412;border-radius:16px;padding:18px;margin-bottom:18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <input data-uid="earn-label" value="${this.esc(s.draft.earnLabel)}" oninput="app.setDraft('earnLabel',this.value)" placeholder="What did you do?" style="flex:1;min-width:180px;font-family:inherit;font-size:15px;font-weight:600;background:#FBF4E9;border:2px solid #161412;border-radius:10px;padding:11px 14px"/>
    <select onchange="app.setDraft('earnSkill',this.value)" style="font-family:inherit;font-size:14px;font-weight:700;background:#FBF4E9;border:2px solid #161412;border-radius:10px;padding:11px 14px;cursor:pointer">${skillOptions}</select>
    <div style="display:flex;align-items:center;background:#FBF4E9;border:2px solid #161412;border-radius:10px;padding:0 14px">
      <span style="font-weight:800;font-size:15px">$</span>
      <input data-uid="earn-amount" value="${this.esc(s.draft.earnAmount)}" oninput="app.setDraft('earnAmount',this.value.replace(/[^0-9.]/g,''))" inputmode="numeric" placeholder="0" style="width:90px;font-family:inherit;font-size:15px;font-weight:700;background:none;border:none;padding:11px 6px"/>
    </div>
    <button onclick="app.addEarning()" style="font-family:'Bricolage Grotesque',sans-serif;font-size:14px;font-weight:700;background:#1F8A4C;color:#fff;border:none;padding:12px 22px;border-radius:10px;cursor:pointer">Bank it</button>
  </div>
  <div style="background:#fff;border:2px solid #161412;border-radius:16px;overflow:hidden">
    ${log || '<div style="padding:30px;text-align:center;font-size:14px;color:#a39c8e;font-weight:600">Nothing banked yet. Log your first win above.</div>'}
  </div>
</div>`;
  }
}

window.app = new HustleApp();
</script>
</body>
</html>
